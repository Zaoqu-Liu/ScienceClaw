name: Bug Report
description: Report a bug in ScienceClaw
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Run '...'
        2. Open '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
      placeholder: Describe the expected outcome.

  - type: input
    id: os
    attributes:
      label: Operating System
      description: e.g. macOS 15.3, Ubuntu 24.04, Windows 11
      placeholder: macOS 15.3

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: v22.0.0

  - type: input
    id: openclaw-version
    attributes:
      label: OpenClaw version
      description: Output of `npx openclaw --version`
      placeholder: 0.2.0

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant log output.
      render: shell
